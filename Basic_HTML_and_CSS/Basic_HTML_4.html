<!DOCTYPE html>
<html>
<body>
    <style>
        .My_Style {
            background-color: red; /* light blue */
            color: blue; /* dark blue */
            text-decoration: underline;
            font-weight: bold;
            font-size: small;
        }
        .font_1 {
            background-color: black; /* AliceBlue */
            color: yellow; /* dark blue */
            font-size: large;
        }
        .font_2 {
            background-color: darkblue; /* seashell */
            color: white; /* dark red */
            font-size: medium;
        }
    </style>
    <h2 class="font_1">This is an H2 with font_1</h2>
    <h3 class="font_2">This is an H3 with font_2</h3>
    <h4 class="font_1">This is an H4 with font_1</h4>
    <p class="My_Style">This is a paragraph using My_Style.</p>
</body>
</html>
