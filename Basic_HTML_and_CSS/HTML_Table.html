<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruits Table</title>
  <link rel="stylesheet" href="CSS_Table.css">
</head>
<body>
  <p>Fruits Table</p>
  <table>
    <tr>
      <th>Item</th>
      <th>Quantity</th>
      <th>Price</th>
    </tr>
    <tr>
      <td>Apples</td>
      <td>4</td>
      <td>$2.00</td>
    </tr>
    <tr>
      <td>Bananas</td>
      <td>6</td>
      <td>$1.50</td>
    </tr>
    <tr>
      <td>Oranges</td>
      <td>3</td>
      <td>$2.25</td>
    </tr>
  </table>
</body>
</html>
